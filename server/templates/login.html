<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Let Me Sync</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <i data-lucide="mountain" style="width:22px;height:22px;"></i>
      Let Me Sync
    </div>
    <h2>Sign in</h2>
    <p>Volcano monitoring file server</p>

    {% if error %}
    <div class="flash error" style="margin-bottom:1rem;">
      <i data-lucide="alert-circle" style="width:16px;height:16px;"></i>
      {{ error }}
    </div>
    {% endif %}

    <form class="login-form" method="post" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:.25rem;">
        <i data-lucide="log-in" style="width:15px;height:15px;"></i>
        Sign in
      </button>
    </form>
  </div>
  <footer style="border-top:none; margin-top:0; text-align:center;">
    <div class="footer-inner" style="justify-content:center;">
      <span>&copy; {{ now().year }} <a href="https://github.com/martanto" target="_blank" rel="noopener">Martanto</a></span>
      <span>&middot;</span>
      <a href="https://github.com/martanto/let-me-sync" target="_blank" rel="noopener">
        <i data-lucide="github" style="width:14px;height:14px;vertical-align:middle;"></i>
        martanto/let-me-sync
      </a>
    </div>
  </footer>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
